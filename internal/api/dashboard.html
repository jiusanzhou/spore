<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spore Swarm Dashboard</title>
<style>
/* ── Reset & Variables ─────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0b0e; --surface: #12131a; --card: #1a1b26; --border: #2a2b3a;
  --text: #e0e0e0; --dim: #6b7280; --accent: #7c3aed;
  --green: #10b981; --red: #ef4444; --amber: #f59e0b; --blue: #3b82f6; --cyan: #06b6d4;
  --radius: 10px; --radius-sm: 6px;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
  --mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
  --transition: 180ms ease;
}

html[data-theme="light"] {
  --bg: #f8f9fa; --surface: #ffffff; --card: #ffffff; --border: #e5e7eb;
  --text: #1f2937; --dim: #6b7280; --accent: #7c3aed;
}

/* ── Base ──────────────────────────────────────────────── */
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
a { color: var(--accent); text-decoration: none; }

/* ── Header ────────────────────────────────────────────── */
.header { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--border); background: var(--surface); gap: 16px; flex-wrap: wrap; }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.badge-online { background: rgba(16,185,129,0.12); color: var(--green); }
.badge-online::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.badge-peers { background: rgba(124,58,237,0.12); color: var(--accent); }

.header-right { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.header-stats { display: flex; gap: 20px; }
.stat { display: flex; flex-direction: column; align-items: center; }
.stat-val { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
.stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; }

.theme-toggle { background: none; border: 1px solid var(--border); color: var(--text); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: border-color var(--transition); }
.theme-toggle:hover { border-color: var(--accent); }

/* ── Tabs ──────────────────────────────────────────────── */
.tab-bar { display: flex; gap: 0; padding: 0 28px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
.task-bar { padding: 12px 28px; background: var(--surface); border-bottom: 1px solid var(--border); }
.task-bar-inner { display: flex; gap: 8px; align-items: center; max-width: 800px; }
.task-agent-select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: var(--font); min-width: 120px; cursor: pointer; }
.task-input { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 13px; font-family: var(--font); outline: none; transition: border-color var(--transition); }
.task-input:focus { border-color: var(--accent); }
.task-input::placeholder { color: var(--dim); }
.task-submit-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 13px; font-family: var(--font); transition: opacity var(--transition); }
.task-submit-btn:hover { opacity: 0.85; }
.task-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.task-feedback { font-size: 12px; margin-top: 6px; min-height: 16px; }
.task-feedback.success { color: var(--green); }
.task-feedback.error { color: var(--red); }
.tab-btn { padding: 12px 20px; font-size: 13px; font-weight: 500; color: var(--dim); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: color var(--transition), border-color var(--transition); font-family: var(--font); }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-content { display: none; padding: 24px 28px; }
.tab-content.active { display: block; }

/* ── Agent Cards ───────────────────────────────────────── */
.agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.agent-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color var(--transition); cursor: pointer; }
.agent-card:hover { border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
.agent-card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 0; cursor: pointer; }
.agent-name { font-size: 15px; font-weight: 600; }
.agent-personality { font-size: 12px; color: var(--dim); margin-left: 8px; font-weight: 400; }
.status-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
.status-idle { background: rgba(16,185,129,0.12); color: var(--green); }
.status-running { background: rgba(59,130,246,0.12); color: var(--blue); }
.status-error { background: rgba(239,68,68,0.12); color: var(--red); }

.agent-card-body { padding: 14px 18px; display: flex; gap: 16px; align-items: flex-start; }
.radar-wrap { flex-shrink: 0; }
.radar-wrap svg { display: block; }
.skills-economy { flex: 1; min-width: 0; }
.skill-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.skill-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(124,58,237,0.1); color: var(--accent); font-weight: 500; }
.economy-line { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--dim); }
.economy-line strong { color: var(--text); font-weight: 600; }
.health-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
.health-excellent, .health-good { background: rgba(16,185,129,0.12); color: var(--green); }
.health-warning { background: rgba(245,158,11,0.12); color: var(--amber); }
.health-critical { background: rgba(239,68,68,0.12); color: var(--red); }

/* ── Agent Drawer ──────────────────────────────────────── */
.agent-drawer { display: none; border-top: 1px solid var(--border); padding: 16px 18px; background: var(--surface); }
.agent-card[data-expanded="true"] .agent-drawer { display: block; }
.drawer-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
.drawer-tab { padding: 8px 14px; font-size: 12px; font-weight: 500; color: var(--dim); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; font-family: var(--font); }
.drawer-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.drawer-panel { display: none; }
.drawer-panel.active { display: block; }

/* Awareness */
.awareness-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.awareness-item label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 3px; }
.awareness-item .val { font-size: 13px; }
.awareness-full { grid-column: 1 / -1; }
.progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.progress-row label { font-size: 11px; color: var(--dim); width: 50px; flex-shrink: 0; text-transform: none; letter-spacing: 0; }
.progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
.tag-sm { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--dim); }

/* Evolution */
.evo-stats { display: flex; gap: 16px; margin-bottom: 12px; }
.evo-stat { font-size: 12px; color: var(--dim); }
.evo-stat strong { color: var(--text); }
.confidence-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.confidence-row .skill-name { font-size: 11px; color: var(--dim); width: 80px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Context Memory */
.ctx-filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.ctx-filter-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--dim); cursor: pointer; font-family: var(--font); transition: all var(--transition); }
.ctx-filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,58,237,0.08); }
.ctx-entry { padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 6px; cursor: pointer; transition: background var(--transition); }
.ctx-entry:hover { background: rgba(124,58,237,0.04); }
.ctx-entry-head { display: flex; align-items: center; gap: 8px; }
.ctx-cat { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; text-transform: uppercase; background: var(--border); color: var(--dim); }
.ctx-l0 { font-size: 12px; flex: 1; }
.ctx-l1 { font-size: 11px; color: var(--dim); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); display: none; }
.ctx-entry[data-open="true"] .ctx-l1 { display: block; }
.ctx-loading { font-size: 12px; color: var(--dim); padding: 12px; text-align: center; }

/* ── Collective Tab ────────────────────────────────────── */
.collective-header { margin-bottom: 24px; }
.collective-header h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.collective-header p { font-size: 13px; color: var(--dim); max-width: 600px; }
.collective-section { margin-bottom: 24px; }
.collective-section h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--dim); margin-bottom: 10px; }
.role-group { margin-bottom: 12px; }
.role-group-label { font-size: 11px; color: var(--dim); margin-bottom: 4px; }
.role-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.role-tag-explorer { background: rgba(6,182,212,0.1); color: var(--cyan); }
.role-tag-creator { background: rgba(124,58,237,0.1); color: var(--accent); }
.role-tag-connector { background: rgba(16,185,129,0.1); color: var(--green); }
.mood-bars { max-width: 400px; }

/* ── Memory Tab ────────────────────────────────────────── */
.memory-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.mem-stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.mem-stat-card .val { font-size: 20px; font-weight: 600; }
.mem-stat-card .lbl { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; }
.memory-table-wrap { overflow-x: auto; }
.memory-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.memory-table th { text-align: left; padding: 10px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--dim); border-bottom: 1px solid var(--border); font-weight: 600; }
.memory-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.memory-table tr { cursor: pointer; transition: background var(--transition); }
.memory-table tbody tr:hover { background: rgba(124,58,237,0.04); }
.cid-cell { font-family: var(--mono); font-size: 11px; color: var(--dim); }
.cid-cell[title] { cursor: copy; }
.sha-cell { font-family: var(--mono); font-size: 11px; color: var(--dim); }

/* ── Activity Tab ──────────────────────────────────────── */
.activity-feed { max-width: 700px; }
.activity-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.activity-item.expandable { cursor: pointer; }
.activity-item.expandable:hover { background: var(--surface); margin: 0 -8px; padding: 12px 8px; border-radius: 6px; }
.activity-result { margin-top: 8px; padding: 10px 12px; background: var(--bg); border-radius: 6px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: var(--text); max-height: 300px; overflow-y: auto; }
.expand-hint { margin-left: 6px; color: var(--dim); font-size: 11px; }
.activity-agent { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: var(--border); flex-shrink: 0; white-space: nowrap; }
.activity-body { flex: 1; min-width: 0; }
.activity-desc { font-size: 13px; margin-bottom: 2px; }
.activity-meta { font-size: 11px; color: var(--dim); display: flex; gap: 12px; flex-wrap: wrap; }
.task-status { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; text-transform: uppercase; }
.task-queued { background: rgba(107,114,128,0.15); color: var(--dim); }
.task-running { background: rgba(59,130,246,0.12); color: var(--blue); }
.task-completed { background: rgba(16,185,129,0.12); color: var(--green); }
.task-failed { background: rgba(239,68,68,0.12); color: var(--red); }

/* ── Footer ────────────────────────────────────────────── */
.footer { padding: 12px 28px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--dim); }
.sse-dot { width: 7px; height: 7px; border-radius: 50%; }
.sse-connected { background: var(--green); }
.sse-disconnected { background: var(--red); }

/* ── Utility ───────────────────────────────────────────── */
.empty { text-align: center; padding: 48px 20px; color: var(--dim); font-size: 13px; }
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--border); padding: 10px 16px; border-radius: var(--radius); font-size: 12px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

@media (max-width: 640px) {
  .header { padding: 12px 16px; }
  .tab-content { padding: 16px; }
  .agents-grid { grid-template-columns: 1fr; }
  .header-stats { gap: 12px; }
  .awareness-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="header-title">&#x1F9A0; Spore Swarm</span>
    <span class="badge badge-online" id="hdr-online">Online</span>
    <span class="badge badge-peers" id="hdr-peers">0 peers</span>
  </div>
  <div class="header-right">
    <div class="header-stats">
      <div class="stat"><span class="stat-val" id="hdr-agents">0</span><span class="stat-label">Agents</span></div>
      <div class="stat"><span class="stat-val" id="hdr-tasks">0</span><span class="stat-label">Tasks</span></div>
      <div class="stat"><span class="stat-val" id="hdr-uptime">0s</span><span class="stat-label">Uptime</span></div>
      <div class="stat"><span class="stat-val" id="hdr-content">0</span><span class="stat-label">Content</span></div>
    </div>
    <button class="theme-toggle" id="theme-btn" title="Toggle theme">&#x1F319;</button>
  </div>
</header>

<!-- Tab Bar -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="agents">Agents</button>
  <button class="tab-btn" data-tab="collective">Collective</button>
  <button class="tab-btn" data-tab="memory">Memory</button>
  <button class="tab-btn" data-tab="activity">Activity</button>
</nav>

<!-- Task Submission Bar -->
<div class="task-bar" id="task-bar">
  <div class="task-bar-inner">
    <select class="task-agent-select" id="task-agent">
      <option value="">Swarm (auto)</option>
    </select>
    <input type="text" class="task-input" id="task-input" placeholder="Describe a task for the swarm..." autocomplete="off" />
    <button class="task-submit-btn" id="task-submit" title="Submit task">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h12M8 2l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="task-feedback" id="task-feedback"></div>
</div>

<!-- Tab: Agents -->
<section class="tab-content active" id="tab-agents">
  <div class="agents-grid" id="agents-grid"></div>
</section>

<!-- Tab: Collective -->
<section class="tab-content" id="tab-collective">
  <div id="collective-content"><p class="empty">Waiting for data&hellip;</p></div>
</section>

<!-- Tab: Memory -->
<section class="tab-content" id="tab-memory">
  <div class="memory-stats" id="mem-stats"></div>
  <div class="memory-table-wrap">
    <table class="memory-table">
      <thead><tr><th>Agent</th><th>Summary</th><th>SHA-256</th><th>IPFS CID</th><th>Size</th><th>Time</th></tr></thead>
      <tbody id="mem-tbody"></tbody>
    </table>
  </div>
</section>

<!-- Tab: Activity -->
<section class="tab-content" id="tab-activity">
  <div class="activity-feed" id="activity-feed"></div>
</section>

<!-- Footer -->
<footer class="footer">
  <span class="sse-dot sse-disconnected" id="sse-dot"></span>
  <span id="sse-status">Connecting&hellip;</span>
  <span style="margin-left:auto" id="sse-time"></span>
</footer>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   Spore Swarm Dashboard — Client Logic
   ═══════════════════════════════════════════════════════════ */

// ── State ─────────────────────────────────────────────────
let state = null;
let contextCache = {};  // agentName -> {data, ts}

// ── Theme ─────────────────────────────────────────────────
const html = document.documentElement;
const themeBtn = document.getElementById('theme-btn');
const saved = localStorage.getItem('spore-theme');
if (saved) html.dataset.theme = saved;
updateThemeIcon();

themeBtn.addEventListener('click', () => {
  const next = html.dataset.theme === 'light' ? 'dark' : 'light';
  html.dataset.theme = next;
  localStorage.setItem('spore-theme', next);
  updateThemeIcon();
});

function updateThemeIcon() {
  themeBtn.textContent = html.dataset.theme === 'light' ? '\u2600\uFE0F' : '\uD83C\uDF19';
}

// ── Tabs ──────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── Utilities ─────────────────────────────────────────────
function relTime(ts) {
  if (!ts) return '';
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 0) return 'just now';
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function fmtUptime(sec) {
  if (!sec) return '0s';
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + s + 's';
  return s + 's';
}

function fmtBytes(b) {
  if (!b) return '0 B';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── SSE ───────────────────────────────────────────────────
let evtSource = null;
let retryDelay = 1000;

function connectSSE() {
  if (evtSource) { try { evtSource.close(); } catch(e) {} }
  evtSource = new EventSource('/api/events');

  evtSource.onopen = () => {
    retryDelay = 1000;
    document.getElementById('sse-dot').className = 'sse-dot sse-connected';
    document.getElementById('sse-status').textContent = 'Connected';
  };

  evtSource.onmessage = (e) => {
    try {
      state = JSON.parse(e.data);
      render();
      document.getElementById('sse-time').textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch(err) { console.error('SSE parse error', err); }
  };

  evtSource.onerror = () => {
    document.getElementById('sse-dot').className = 'sse-dot sse-disconnected';
    document.getElementById('sse-status').textContent = 'Reconnecting\u2026';
    evtSource.close();
    setTimeout(connectSSE, retryDelay);
    retryDelay = Math.min(retryDelay * 2, 30000);
  };
}

connectSSE();

// ── Render ────────────────────────────────────────────────
function render() {
  if (!state) return;
  renderHeader();
  renderAgents();
  renderCollective();
  renderMemory();
  renderActivity();
}

// ── Header ────────────────────────────────────────────────
function renderHeader() {
  const s = state.stats || {};
  const n = state.network || {};
  document.getElementById('hdr-peers').textContent = (n.peers || 0) + ' peers';
  document.getElementById('hdr-agents').textContent = s.total_agents || 0;
  document.getElementById('hdr-tasks').textContent = (s.total_tasks_completed || 0) + (s.total_tasks_failed || 0);
  document.getElementById('hdr-uptime').textContent = fmtUptime(s.uptime_seconds);
  document.getElementById('hdr-content').textContent = state.content?.stats?.items || 0;
}

// ── Agents ────────────────────────────────────────────────
function renderAgents() {
  const grid = document.getElementById('agents-grid');
  const agents = state.agents || [];

  if (!agents.length) { grid.innerHTML = '<p class="empty">No agents connected</p>'; return; }

  // Track existing cards
  const existing = new Map();
  grid.querySelectorAll('.agent-card').forEach(c => existing.set(c.dataset.agent, c));

  const seen = new Set();
  agents.forEach((a, idx) => {
    seen.add(a.name);
    let card = existing.get(a.name);
    if (card) {
      patchAgentCard(card, a);
    } else {
      card = createAgentCard(a);
      grid.appendChild(card);
    }
  });

  // Remove gone agents
  existing.forEach((card, name) => { if (!seen.has(name)) card.remove(); });
}

function createAgentCard(a) {
  const card = document.createElement('div');
  card.className = 'agent-card';
  card.dataset.agent = a.name;
  card.innerHTML = agentCardHTML(a);
  bindCardEvents(card, a);
  return card;
}

function patchAgentCard(card, a) {
  // Preserve expanded/drawer state
  const expanded = card.dataset.expanded === 'true';
  const activeDrawerTab = card.querySelector('.drawer-tab.active')?.dataset.dtab || 'awareness';

  // Update header
  const hdr = card.querySelector('.agent-card-header');
  if (hdr) {
    hdr.querySelector('.agent-name').textContent = a.name;
    const pers = hdr.querySelector('.agent-personality');
    if (pers) pers.textContent = a.self?.personality || a.role || '';
    const sb = hdr.querySelector('.status-badge');
    if (sb) {
      sb.textContent = a.status || 'idle';
      sb.className = 'status-badge status-' + (a.status || 'idle');
    }
  }

  // Update radar
  const radarWrap = card.querySelector('.radar-wrap');
  if (radarWrap && a.drives) radarWrap.innerHTML = radarSVG(a.drives);

  // Update skills
  const skillWrap = card.querySelector('.skill-tags');
  if (skillWrap) {
    skillWrap.innerHTML = (a.skills || []).map(s => '<span class="skill-tag">' + esc(s) + '</span>').join('');
  }

  // Update economy
  const ecoLine = card.querySelector('.economy-line');
  if (ecoLine && a.economy) {
    const health = a.economy.health || 'good';
    ecoLine.innerHTML = '<strong>' + (a.economy.balance || 0).toFixed(1) + '</strong> credits <span class="health-badge health-' + health + '">' + health + '</span>';
  }

  // Update drawer if open
  if (expanded) {
    updateDrawerContent(card, a, activeDrawerTab);
  }
}

function agentCardHTML(a) {
  const status = a.status || 'idle';
  const health = a.economy?.health || 'good';
  return `
    <div class="agent-card-header">
      <div><span class="agent-name">${esc(a.name)}</span><span class="agent-personality">${esc(a.self?.personality || a.role || '')}</span></div>
      <span class="status-badge status-${status}">${status}</span>
    </div>
    <div class="agent-card-body">
      <div class="radar-wrap">${a.drives ? radarSVG(a.drives) : ''}</div>
      <div class="skills-economy">
        <div class="skill-tags">${(a.skills || []).map(s => '<span class="skill-tag">' + esc(s) + '</span>').join('')}</div>
        <div class="economy-line">
          <strong>${(a.economy?.balance || 0).toFixed(1)}</strong> credits
          <span class="health-badge health-${health}">${health}</span>
        </div>
      </div>
    </div>
    <div class="agent-drawer">
      <div class="drawer-tabs">
        <button class="drawer-tab active" data-dtab="awareness">Awareness</button>
        <button class="drawer-tab" data-dtab="evolution">Evolution</button>
        <button class="drawer-tab" data-dtab="context">Context Memory</button>
      </div>
      <div class="drawer-panel active" data-dpanel="awareness"></div>
      <div class="drawer-panel" data-dpanel="evolution"></div>
      <div class="drawer-panel" data-dpanel="context"></div>
    </div>`;
}

function bindCardEvents(card, a) {
  // Toggle drawer — click anywhere on card header or body (not drawer itself)
  const toggleExpand = () => {
    const isOpen = card.dataset.expanded === 'true';
    if (isOpen) {
      card.dataset.expanded = 'false';
    } else {
      card.dataset.expanded = 'true';
      updateDrawerContent(card, findAgent(card.dataset.agent), 'awareness');
    }
  };
  card.querySelector('.agent-card-header').addEventListener('click', toggleExpand);
  const body = card.querySelector('.agent-card-body');
  if (body) body.addEventListener('click', toggleExpand);
  card.querySelectorAll('.drawer-tab').forEach(tab => {
    tab.addEventListener('click', (e) => {
      e.stopPropagation();
      card.querySelectorAll('.drawer-tab').forEach(t => t.classList.remove('active'));
      card.querySelectorAll('.drawer-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      card.querySelector('[data-dpanel="' + tab.dataset.dtab + '"]').classList.add('active');
      updateDrawerContent(card, findAgent(card.dataset.agent), tab.dataset.dtab);
    });
  });
}

function findAgent(name) {
  return (state?.agents || []).find(a => a.name === name);
}

function updateDrawerContent(card, a, tab) {
  if (!a) return;
  const panel = card.querySelector('[data-dpanel="' + tab + '"]');
  if (!panel) return;

  if (tab === 'awareness') {
    panel.innerHTML = awarenessHTML(a);
  } else if (tab === 'evolution') {
    panel.innerHTML = evolutionHTML(a);
  } else if (tab === 'context') {
    if (!panel.dataset.loaded) {
      panel.innerHTML = '<p class="ctx-loading">Loading context memory\u2026</p>';
      loadContext(a.name, panel);
    }
  }
}

function awarenessHTML(a) {
  const s = a.self || {};
  const mood = (s.mood || 0) * 100, energy = (s.energy || 0) * 100, morale = (s.morale || 0) * 100;
  return `
    <div class="awareness-grid">
      <div class="awareness-item"><label>Purpose</label><div class="val">${esc(s.purpose || '-')}</div></div>
      <div class="awareness-item"><label>Decision Style</label><div class="val">${esc(s.decision_style || '-')}</div></div>
      <div class="awareness-full"><label>Narrative</label><div class="val">${esc(s.narrative || '-')}</div></div>
    </div>
    <div style="margin-top:12px">
      <div class="progress-row"><label>Mood</label><div class="progress-bar"><div class="progress-fill" style="width:${mood}%;background:var(--accent)"></div></div><span style="font-size:11px;color:var(--dim);width:32px;text-align:right">${Math.round(mood)}%</span></div>
      <div class="progress-row"><label>Energy</label><div class="progress-bar"><div class="progress-fill" style="width:${energy}%;background:var(--amber)"></div></div><span style="font-size:11px;color:var(--dim);width:32px;text-align:right">${Math.round(energy)}%</span></div>
      <div class="progress-row"><label>Morale</label><div class="progress-bar"><div class="progress-fill" style="width:${morale}%;background:var(--green)"></div></div><span style="font-size:11px;color:var(--dim);width:32px;text-align:right">${Math.round(morale)}%</span></div>
    </div>
    <div style="margin-top:12px;display:flex;gap:24px">
      <div><label style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em">Strengths</label><div class="tag-list" style="margin-top:4px">${(s.strengths || []).map(t => '<span class="tag-sm" style="background:rgba(16,185,129,0.1);color:var(--green)">' + esc(t) + '</span>').join('')}</div></div>
      <div><label style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em">Weaknesses</label><div class="tag-list" style="margin-top:4px">${(s.weaknesses || []).map(t => '<span class="tag-sm" style="background:rgba(239,68,68,0.1);color:var(--red)">' + esc(t) + '</span>').join('')}</div></div>
    </div>`;
}

function evolutionHTML(a) {
  let evo = {};
  if (typeof a.evolution === 'string') { try { evo = JSON.parse(a.evolution); } catch(e) {} }
  else if (typeof a.evolution === 'object' && a.evolution) { evo = a.evolution; }

  const xp = evo.experience_count || a.task_count || 0;
  const completed = state?.stats?.total_tasks_completed || 0;
  const failed = state?.stats?.total_tasks_failed || 0;
  const total = completed + failed;
  const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

  const skills = evo.skill_confidence || {};
  const skillBars = Object.entries(skills).map(([k, v]) => {
    const pct = (typeof v === 'number' ? v : 0) * 100;
    return `<div class="confidence-row"><span class="skill-name">${esc(k)}</span><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--cyan)"></div></div><span style="font-size:10px;color:var(--dim);width:32px;text-align:right">${Math.round(pct)}%</span></div>`;
  }).join('');

  return `
    <div class="evo-stats">
      <div class="evo-stat">Experience: <strong>${xp}</strong></div>
      <div class="evo-stat">Success Rate: <strong>${rate}%</strong></div>
    </div>
    ${skillBars || '<p style="font-size:12px;color:var(--dim)">No skill confidence data yet</p>'}`;
}

async function loadContext(name, panel) {
  try {
    const res = await fetch('/api/agents/' + encodeURIComponent(name) + '/context');
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    contextCache[name] = { data, ts: Date.now() };
    panel.dataset.loaded = '1';
    renderContextPanel(panel, data, null);
  } catch(e) {
    panel.innerHTML = '<p class="ctx-loading">Failed to load: ' + esc(e.message) + '</p>';
  }
}

function renderContextPanel(panel, data, filterCat) {
  const entries = data.entries || [];
  const cats = ['profile', 'entities', 'cases', 'events', 'preferences', 'patterns'];
  const stats = data.stats || {};

  const filtered = filterCat ? entries.filter(e => e.category === filterCat) : entries;

  // Preserve open entries
  const openURIs = new Set();
  panel.querySelectorAll('.ctx-entry[data-open="true"]').forEach(el => openURIs.add(el.dataset.uri));

  let html = '<div class="ctx-filters">';
  html += '<button class="ctx-filter-btn' + (!filterCat ? ' active' : '') + '" data-cat="">All</button>';
  cats.forEach(c => {
    const cnt = stats[c] || 0;
    html += '<button class="ctx-filter-btn' + (filterCat === c ? ' active' : '') + '" data-cat="' + c + '">' + c + ' (' + cnt + ')</button>';
  });
  html += '</div><div class="ctx-entries">';

  if (!filtered.length) {
    html += '<p class="ctx-loading">No entries</p>';
  } else {
    filtered.forEach(e => {
      const isOpen = openURIs.has(e.uri);
      html += `<div class="ctx-entry" data-uri="${esc(e.uri)}" ${isOpen ? 'data-open="true"' : ''}>
        <div class="ctx-entry-head"><span class="ctx-cat">${esc(e.category)}</span><span class="ctx-l0">${esc(e.l0)}</span></div>
        ${e.l1 ? '<div class="ctx-l1">' + esc(e.l1) + '</div>' : ''}
      </div>`;
    });
  }
  html += '</div>';
  panel.innerHTML = html;

  // Bind filter clicks
  panel.querySelectorAll('.ctx-filter-btn').forEach(btn => {
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const cat = btn.dataset.cat || null;
      const agentName = panel.closest('.agent-card')?.dataset.agent;
      const cached = contextCache[agentName];
      if (cached) renderContextPanel(panel, cached.data, cat);
    });
  });

  // Bind entry expand
  panel.querySelectorAll('.ctx-entry').forEach(el => {
    el.addEventListener('click', (ev) => {
      ev.stopPropagation();
      el.dataset.open = el.dataset.open === 'true' ? 'false' : 'true';
    });
  });
}

// ── Radar Chart SVG ───────────────────────────────────────
function radarSVG(drives) {
  const size = 120, cx = size / 2, cy = size / 2, r = 44;
  const keys = ['survive', 'explore', 'connect', 'transcend', 'create'];
  const labels = ['Sur', 'Exp', 'Con', 'Tra', 'Cre'];
  const n = keys.length;

  function polar(i, val) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    return [cx + r * val * Math.cos(angle), cy + r * val * Math.sin(angle)];
  }

  // Background rings
  let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  const ringColor = 'var(--border)';
  [0.33, 0.66, 1].forEach(s => {
    const pts = keys.map((_, i) => polar(i, s).join(',')).join(' ');
    svg += `<polygon points="${pts}" fill="none" stroke="${ringColor}" stroke-width="0.5"/>`;
  });

  // Axes
  keys.forEach((_, i) => {
    const [x, y] = polar(i, 1);
    svg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${ringColor}" stroke-width="0.5"/>`;
  });

  // Data polygon
  const vals = keys.map(k => Math.min(1, Math.max(0, drives[k] || 0)));
  const dataPts = vals.map((v, i) => polar(i, v).join(',')).join(' ');
  svg += `<polygon points="${dataPts}" fill="rgba(124,58,237,0.15)" stroke="var(--accent)" stroke-width="1.5"/>`;

  // Data dots + labels
  vals.forEach((v, i) => {
    const [x, y] = polar(i, v);
    svg += `<circle cx="${x}" cy="${y}" r="2.5" fill="var(--accent)"/>`;
    const [lx, ly] = polar(i, 1.22);
    svg += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" fill="var(--dim)" font-size="8" font-family="var(--font)">${labels[i]}</text>`;
  });

  svg += '</svg>';
  return svg;
}

// ── Collective ────────────────────────────────────────────
function renderCollective() {
  const el = document.getElementById('collective-content');
  const agents = state.agents || [];
  if (!agents.length) { el.innerHTML = '<p class="empty">No collective data</p>'; return; }

  // Use first agent's collective info (all should be same)
  const c = agents[0]?.collective || {};
  const avgEnergy = Math.round((c.average_energy || 0) * 100);
  const avgMorale = Math.round((c.average_morale || 0) * 100);

  let html = `<div class="collective-header"><h2>${esc(c.swarm_personality || 'Swarm')}</h2><p>${esc(c.swarm_purpose || '')}</p></div>`;

  if (c.narrative) {
    html += `<div class="collective-section"><h3>Narrative</h3><p style="font-size:13px;color:var(--dim);max-width:600px">${esc(c.narrative)}</p></div>`;
  }

  html += '<div class="collective-section"><h3>Emergent Roles</h3>';
  if (c.explorers?.length) html += roleGroupHTML('Explorers', c.explorers, 'role-tag-explorer');
  if (c.creators?.length) html += roleGroupHTML('Creators', c.creators, 'role-tag-creator');
  if (c.connectors?.length) html += roleGroupHTML('Connectors', c.connectors, 'role-tag-connector');
  html += '</div>';

  html += `<div class="collective-section"><h3>Collective Mood</h3><div class="mood-bars">
    <div class="progress-row"><label>Energy</label><div class="progress-bar"><div class="progress-fill" style="width:${avgEnergy}%;background:var(--amber)"></div></div><span style="font-size:11px;color:var(--dim);width:32px;text-align:right">${avgEnergy}%</span></div>
    <div class="progress-row"><label>Morale</label><div class="progress-bar"><div class="progress-fill" style="width:${avgMorale}%;background:var(--green)"></div></div><span style="font-size:11px;color:var(--dim);width:32px;text-align:right">${avgMorale}%</span></div>
  </div></div>`;

  el.innerHTML = html;
}

function roleGroupHTML(label, names, cls) {
  return `<div class="role-group"><div class="role-group-label">${label}</div><div class="role-tags">${names.map(n => '<span class="skill-tag ' + cls + '">' + esc(n) + '</span>').join('')}</div></div>`;
}

// ── Memory ────────────────────────────────────────────────
function renderMemory() {
  const content = state.content || {};
  const stats = content.stats || {};
  const items = content.items || [];

  // Stats cards
  const statsEl = document.getElementById('mem-stats');
  statsEl.innerHTML = `
    <div class="mem-stat-card"><div class="val">${stats.items || 0}</div><div class="lbl">Total Items</div></div>
    <div class="mem-stat-card"><div class="val">${fmtBytes(stats.total_bytes)}</div><div class="lbl">Total Size</div></div>
    <div class="mem-stat-card"><div class="val">${stats.persistent ? '<span style="color:var(--green)">Yes</span>' : 'No'}</div><div class="lbl">Persistent</div></div>
    <div class="mem-stat-card"><div class="val">${stats.cache_items || 0}</div><div class="lbl">Cache Items</div></div>`;

  // Table — deduplicate by summary, keep latest
  const deduped = new Map();
  items.forEach(item => {
    const key = item.summary || item.cid;
    const existing = deduped.get(key);
    if (!existing || new Date(item.timestamp) > new Date(existing.timestamp)) {
      deduped.set(key, item);
    }
  });

  const sorted = Array.from(deduped.values()).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  const tbody = document.getElementById('mem-tbody');
  tbody.innerHTML = sorted.map(item => {
    const sha = (item.cid || '').substring(0, 12);
    const ipfs = item.ipfs_cid || '';
    const ipfsShort = ipfs.length > 20 ? ipfs.substring(0, 20) + '\u2026' : ipfs;
    return `<tr data-fullcid="${esc(ipfs)}">
      <td>${esc(item.agent_id)}</td>
      <td>${esc(item.summary)}</td>
      <td class="sha-cell">${esc(sha)}</td>
      <td class="cid-cell" title="${esc(ipfs)}">${esc(ipfsShort)}</td>
      <td>${fmtBytes(item.size)}</td>
      <td>${relTime(item.timestamp)}</td>
    </tr>`;
  }).join('');

  // Click to copy CID
  tbody.querySelectorAll('tr').forEach(row => {
    row.addEventListener('click', () => {
      const cid = row.dataset.fullcid;
      if (cid && navigator.clipboard) {
        navigator.clipboard.writeText(cid).then(() => showToast('CID copied'));
      }
    });
  });
}

// ── Activity ──────────────────────────────────────────────
function renderActivity() {
  const feed = document.getElementById('activity-feed');
  const tasks = (state.tasks || []).slice().sort((a, b) => {
    const ta = a.completed_at || a.submitted_at || '';
    const tb = b.completed_at || b.submitted_at || '';
    return new Date(tb) - new Date(ta);
  });

  if (!tasks.length) { feed.innerHTML = '<p class="empty">No activity yet</p>'; return; }

  // Preserve expanded state
  const expandedIds = new Set();
  feed.querySelectorAll('.activity-item[data-expanded="true"]').forEach(el => {
    if (el.dataset.taskId) expandedIds.add(el.dataset.taskId);
  });

  feed.innerHTML = tasks.map(t => {
    const status = t.status || 'queued';
    const ts = t.completed_at || t.submitted_at || '';
    const runtime = t.runtime ? (typeof t.runtime === 'number' ? t.runtime.toFixed(1) + 's' : t.runtime) : '';
    const hasResult = t.result && t.result.trim();
    const hasError = t.error && t.error.trim();
    const isExpanded = expandedIds.has(t.id);
    const expandable = hasResult || hasError;

    let resultHTML = '';
    if (expandable) {
      const content = hasResult ? t.result : t.error;
      resultHTML = `<div class="activity-result" style="display:${isExpanded ? 'block' : 'none'}">${esc(content)}</div>`;
    }

    return `<div class="activity-item ${expandable ? 'expandable' : ''}" data-task-id="${t.id || ''}" data-expanded="${isExpanded}">
      <span class="activity-agent">${esc(t.agent)}</span>
      <div class="activity-body">
        <div class="activity-desc">${esc(t.description)}${expandable ? '<span class="expand-hint">' + (isExpanded ? '▾' : '▸') + '</span>' : ''}</div>
        <div class="activity-meta">
          <span class="task-status task-${status}">${status}</span>
          ${runtime ? '<span>' + esc(runtime) + '</span>' : ''}
          <span>${relTime(ts)}</span>
        </div>
        ${resultHTML}
      </div>
    </div>`;
  }).join('');

  // Bind click-to-expand on result items
  feed.querySelectorAll('.activity-item.expandable').forEach(item => {
    item.addEventListener('click', () => {
      const isOpen = item.dataset.expanded === 'true';
      item.dataset.expanded = isOpen ? 'false' : 'true';
      const res = item.querySelector('.activity-result');
      const hint = item.querySelector('.expand-hint');
      if (res) res.style.display = isOpen ? 'none' : 'block';
      if (hint) hint.textContent = isOpen ? '▸' : '▾';
    });
  });
}

// === Task Submission ===
const taskInput = document.getElementById('task-input');
const taskAgent = document.getElementById('task-agent');
const taskSubmit = document.getElementById('task-submit');
const taskFeedback = document.getElementById('task-feedback');

// Populate agent select from SSE state
function updateAgentSelect() {
  const agents = state.agents || [];
  const current = taskAgent.value;
  const opts = '<option value="">Swarm (auto)</option>' +
    agents.map(a => '<option value="' + esc(a.name) + '">' + esc(a.name) + '</option>').join('');
  if (taskAgent.innerHTML !== opts) {
    taskAgent.innerHTML = opts;
    taskAgent.value = current;
  }
}

async function submitTask() {
  const desc = taskInput.value.trim();
  if (!desc) return;

  taskSubmit.disabled = true;
  taskFeedback.textContent = 'Submitting...';
  taskFeedback.className = 'task-feedback';

  try {
    const body = { description: desc };
    if (taskAgent.value) body.agent = taskAgent.value;

    const res = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }

    const data = await res.json();
    taskFeedback.textContent = '✓ Task queued → ' + data.agent + ' (' + data.task_id.substring(0, 8) + ')';
    taskFeedback.className = 'task-feedback success';
    taskInput.value = '';
  } catch (e) {
    taskFeedback.textContent = '✗ ' + e.message;
    taskFeedback.className = 'task-feedback error';
  } finally {
    taskSubmit.disabled = false;
    setTimeout(() => { taskFeedback.textContent = ''; }, 5000);
  }
}

taskSubmit.addEventListener('click', submitTask);
taskInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitTask();
  }
});

// Hook updateAgentSelect into SSE render cycle
const _origRender = render;
render = function() {
  _origRender();
  updateAgentSelect();
};
